name: Update TQQQ price
on:
  schedule:
    - cron: '30 21 * * 1-5'   # 평일 21:30 UTC = KST 06:30 (마감 후)
    - cron: '30 13 * * 1-5'   # KST 22:30 (장중 참고)
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 fetch_tqqq.py
      - name: Commit
        run: |
          git config user.name "vr-bot"
          git config user.email "actions@github.com"
          git add tqqq.json
          git diff --cached --quiet || git commit -m "price update"
          git push
